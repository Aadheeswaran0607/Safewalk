<!DOCTYPE html><html>
<head>
    <meta charset="UTF-8">
    <title>SafeWalk Register</title><style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #00c853;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .link {
        margin-top: 15px;
        cursor: pointer;
        font-size: 14px;
    }

    #status {
        margin-top: 10px;
        font-size: 14px;
    }
</style>

</head><body><div class="card"><h2>📝 Register</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="phone" placeholder="Phone Number">

    <button onclick="register()">Create Account</button>

    <p class="link" onclick="goToLogin()">Already have an account? Login</p>

    <p id="status"></p>

</div><script>
    const BASE_URL = window.location.origin;

    function register() {

        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let phone = document.getElementById("phone").value;

        let msg = document.getElementById("status");
        msg.innerText = "Creating account...";
        msg.style.color = "white";

        fetch(BASE_URL + "/user/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                email: email,
                password: password,
                phone: phone
            })
        })
        .then(res => res.json())
        .then(data => {
            msg.innerText = "✅ Account Created";
            msg.style.color = "lime";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1000);
        })
        .catch(err => {
            msg.innerText = "❌ Error creating account";
            msg.style.color = "red";
        });
    }

    function goToLogin(){
        window.location.href = "login.html";
    }
</script></body>
</html>
